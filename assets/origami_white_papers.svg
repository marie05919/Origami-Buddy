<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Greyish-White Origami Paper Stack -->
  <g transform="translate(0, 15)">
    <!-- Sheet 1 (Bottom, Darker Grey) -->
    <g>
      <!-- Thickness -->
      <polygon points="60,140 60,142 100,162 100,160" fill="#94a3b8" />
      <polygon points="100,160 100,162 140,142 140,140" fill="#64748b" />
      <!-- Top Face -->
      <polygon points="60,140 100,120 140,140 100,160" fill="#cbd5e1" />
    </g>

    <!-- Sheet 2 (Medium Grey) -->
    <g>
      <!-- Thickness -->
      <polygon points="55,125 55,127 95,147 95,145" fill="#cbd5e1" />
      <polygon points="95,145 95,147 135,127 135,125" fill="#94a3b8" />
      <!-- Top Face -->
      <polygon points="55,125 95,105 135,125 95,145" fill="#e2e8f0" />
    </g>

    <!-- Sheet 3 (Light Grey) -->
    <g>
      <!-- Thickness -->
      <polygon points="65,110 65,112 105,132 105,130" fill="#e2e8f0" />
      <polygon points="105,130 105,132 145,112 145,110" fill="#cbd5e1" />
      <!-- Top Face -->
      <polygon points="65,110 105,90 145,110 105,130" fill="#f1f5f9" />
    </g>

    <!-- Sheet 4 (Top, Soft White) -->
    <g>
      <!-- Thickness -->
      <polygon points="60,95 60,97 100,117 100,115" fill="#f1f5f9" />
      <polygon points="100,115 100,117 140,97 140,95" fill="#e2e8f0" />
      <!-- Top Face -->
      <polygon points="60,95 100,75 140,95 100,115" fill="#f8fafc" />
    </g>
  </g>
</svg>

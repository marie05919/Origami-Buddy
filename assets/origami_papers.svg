<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Colorful Origami Paper Stack -->
  <g transform="translate(0, 15)">
    <!-- Sheet 1 (Bottom, Pink/Rose) -->
    <g>
      <!-- Thickness -->
      <polygon points="60,140 60,143 100,163 100,160" fill="#be123c" />
      <polygon points="100,160 100,163 140,143 140,140" fill="#9f1239" />
      <!-- Top Face -->
      <polygon points="60,140 100,120 140,140 100,160" fill="#f43f5e" />
    </g>

    <!-- Sheet 2 (Yellow/Amber) -->
    <g>
      <!-- Thickness -->
      <polygon points="55,125 55,128 95,148 95,145" fill="#b45309" />
      <polygon points="95,145 95,148 135,128 135,125" fill="#92400e" />
      <!-- Top Face -->
      <polygon points="55,125 95,105 135,125 95,145" fill="#fbbf24" />
    </g>

    <!-- Sheet 3 (Teal/Sky Blue) -->
    <g>
      <!-- Thickness -->
      <polygon points="65,110 65,113 105,133 105,130" fill="#0369a1" />
      <polygon points="105,130 105,133 145,113 145,110" fill="#075985" />
      <!-- Top Face -->
      <polygon points="65,110 105,90 145,110 105,130" fill="#0ea5e9" />
    </g>

    <!-- Sheet 4 (Top, Purple/Violet) -->
    <g>
      <!-- Thickness -->
      <polygon points="60,95 60,98 100,118 100,115" fill="#5b21b6" />
      <polygon points="100,115 100,118 140,98 140,95" fill="#4c1d95" />
      <!-- Top Face -->
      <polygon points="60,95 100,75 140,95 100,115" fill="#8b5cf6" />
    </g>
  </g>
</svg>
